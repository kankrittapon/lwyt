name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install WiX Toolset
        shell: pwsh
        run: dotnet tool install --global wix

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Verify Source
        shell: pwsh
        run: |
          cargo fmt --all -- --check
          cargo test --locked

      - name: Run Build and Packaging Script
        shell: pwsh
        run: ./build.ps1 -RequireInstallers

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LYTBokkChoYx-${{ github.ref_name }}-windows-x64
          path: |
            target/release/LYTBokkChoYx.msi
            target/release/LYTBokkChoYx_Setup.exe
            target/release/lytbokkchoyx.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            target/release/LYTBokkChoYx.msi
            target/release/LYTBokkChoYx_Setup.exe
            target/release/lytbokkchoyx.exe
          draft: false
          prerelease: false
